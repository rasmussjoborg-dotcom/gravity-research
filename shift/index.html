<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shift — Behavioral Spending Nudge App</title>
  <meta name="description" content="Shift: autonomous research into behavioral spending nudges. Powered by Gravity Claw.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#08080c;--s:#0f0f16;--b:#1e1e2e;--t:#e4e4e7;--td:#71717a;--accent:#34d399}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
    .wrap{max-width:480px;padding:2rem}
    .icon{font-size:3rem;margin-bottom:1rem}
    h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#a7f3d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
    p{color:var(--td);font-size:.9rem;line-height:1.5;margin-bottom:1rem}
    .badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-family:'JetBrains Mono',monospace;background:var(--s);border:1px solid var(--b);padding:.35rem .75rem;border-radius:100px}
    .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:b 2s ease-in-out infinite}
    @keyframes b{0%,100%{opacity:1}50%{opacity:.3}}
    a{color:var(--accent);text-decoration:none;font-size:.75rem;font-family:'JetBrains Mono',monospace;display:block;margin-top:1.5rem}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">💸</div>
    <h1>Shift</h1>
    <p>Behavioral spending nudge app — weekly challenges that make saving feel effortless.</p>
    <div class="badge"><span class="dot"></span> Research starting tonight</div>
    <a href="https://research.rsjo.io">← research.rsjo.io</a>
  </div>
</body>
</html>
